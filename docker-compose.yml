services:
  nginx:
    image: nginx:alpine
    container_name: vm1-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html/client:ro
      - ./admin/dist:/usr/share/nginx/html/bifrost-admin:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    restart: unless-stopped
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge